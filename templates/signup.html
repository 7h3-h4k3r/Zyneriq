{%extends 'auth/zyneriq-auth.html' %}

{%block content %}
    <div id="signupFormBox" class="form-container">
            <form id="signupForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="signupName" placeholder="adam">
                </div>
                <div class="input-group">
                    <label>Email address</label>
                    <input type="email" id="signupEmail" placeholder="adam@creative-tim.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="create a password">
                </div>
                <button type="submit" class="submit-btn">Create Account →</button>
                <div class="demo-hint">
                    📝 Sign up to manage IoT devices and projects.
                </div>
            </form>
        </div>
    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
{%endblock %}
