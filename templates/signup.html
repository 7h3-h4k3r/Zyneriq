{% extends "_main.html" %}

{% block content %}
    <!-- SIGN UP -->
      <div >
        <div class="auth-page">
          <div class="auth-card">
            <h2>Join us today</h2>
            <p>Enter your details to register</p>
            <div class="form-group"><label>NAME</label><input type="text" placeholder="Your full name"></div>
            <div class="form-group"><label>EMAIL</label><input type="email" placeholder="Your email address"></div>
            <div class="form-group"><label>PASSWORD</label><input type="password" placeholder="Your password"></div>
            <div class="toggle-check"><input type="checkbox"> <span>I agree to the <a href="#" style="color:var(--primary)">Terms and Conditions</a></span></div>
            <button class="btn-primary">SIGN UP</button>
            <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)">Already have an account? <a href="#signin" style="color:var(--primary);font-weight:600">Sign in</a></p>
          </div>
        </div>
      </div>

    {% endblock %}
