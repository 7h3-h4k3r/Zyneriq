<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Monitor — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: #fafbfc;
    overflow: hidden;
  }



  /* ── RIGHT ── */
  .right {
  
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 70px;
  }

  .form-box {
    width: 100%; max-width: 380px;
  }

  .form-head {
    margin-bottom: 35px;
  }
  .form-head-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, rgba(58,134,255,0.1), rgba(131,56,236,0.1));
    border: 1px solid rgba(131,56,236,0.2);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 500;
    color: #8338ec;
    margin-bottom: 16px;
    letter-spacing: 0.2px;
  }
  .form-head-tag span.dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a86ff, #8338ec);
    display: inline-block;
  }
  .form-head h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.8px;
    margin-bottom: 6px;
  }
  .form-head p {
    font-size: 14px;
    color: #64748b;
    line-height: 1.5;
  }

  /* TABS */
  .tab-row {
    display: flex;
    background: #f1f5f9;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1; padding: 9px 0;
    border: none; background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500;
    color: #94a3b8;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .tab-btn.active {
    background: #ffffff;
    color: #0f172a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
  }

  /* FORM FIELDS */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px; font-weight: 500;
    color: #374151;
    margin-bottom: 6px;
  }
  .field-wrap { position: relative; }
  .field-ico {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    display: flex; pointer-events: none;
    transition: color 0.2s;
  }
  .field input {
    width: 100%;
    height: 44px;
    padding: 0 12px 0 38px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px; color: #0f172a;
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .field input::placeholder { color: #c4cdd8; }
  .field input:focus {
    border-color: #3a86ff;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(58,134,255,0.12);
  }
  .field input:focus ~ .field-ico,
  .field-wrap:focus-within .field-ico { color: #3a86ff; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .row-between {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .chk-label {
    display: flex; align-items: center; gap: 7px;
    cursor: pointer;
    font-size: 13px; color: #64748b;
  }
  .chk-label input { display: none; }
  .chk-box {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid #cbd5e1;
    display: grid; place-items: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .chk-label input:checked ~ .chk-box {
    background: linear-gradient(135deg, #3a86ff, #8338ec);
    border-color: transparent;
  }
  .chk-label input:checked ~ .chk-box::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }
  .link-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    background: linear-gradient(135deg, #3a86ff, #8338ec);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .btn-primary {
    width: 100%; height: 46px;
    background: linear-gradient(135deg, #3a86ff, #8338ec);
    border: none; border-radius: 10px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    box-shadow: 0 4px 20px rgba(58,134,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(58,134,255,0.40); }
  .btn-primary:active { transform: translateY(0); opacity: 0.92; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: #e2e8f0;
  }
  .divider span { font-size: 12px; color: #94a3b8; white-space: nowrap; }

  .social-row { display: flex; gap: 10px; }
  .btn-social {
    flex: 1; height: 42px;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; color: #374151;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }
  .btn-social:hover { background: #fff; border-color: #c7d2fe; transform: translateY(-1px); }

  /* strength */
  .strength-row { display: flex; gap: 4px; margin-top: 8px; }
  .s-seg { flex:1; height: 3px; border-radius: 2px; background: #e2e8f0; transition: background .3s; }
  .fill-weak   { background: #f43f5e; }
  .fill-medium { background: #f59e0b; }
  .fill-strong { background: #10b981; }

  /* panel */
  .panel { display: none; }
  .panel.active { display: block; }

  @media (max-width: 800px) {
    .page { grid-template-columns: 1fr; }
    .left  { display: none; }
    .right { padding: 24px 20px; }
  }
</style>
</head>
<body>
<div class="page">



  <!-- RIGHT: form side -->
  <div class="right">
    <div class="form-box">
      <div class="form-head">
        <div class="form-head-tag"><span class="dot"></span> IoT Dashboard</div>
        <h1 id="form-title">Welcome back</h1>
        <p id="form-sub">Sign in to your account to continue.</p>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login',this)">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup',this)">Create Account</button>
      </div>

      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <div class="field">
          <label>Email address</label>
          <div class="field-wrap">
            <span class="field-ico">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" placeholder="you@company.com">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-wrap">
            <span class="field-ico">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" placeholder="••••••••">
          </div>
        </div>
        <div class="row-between">
          <label class="chk-label">
            <input type="checkbox">
            <span class="chk-box"></span>
            Keep me signed in
          </label>
          <button class="link-btn">Forgot password?</button>
        </div>
        <button class="btn-primary">Sign In →</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-row">
          <button class="btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#333"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
      </div>

      <!-- SIGNUP -->
      <div class="panel" id="panel-signup">
        <div class="two-col">
          <div class="field">
            <label>First name</label>
            <div class="field-wrap">
              <span class="field-ico"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
              <input type="text" placeholder="Alex">
            </div>
          </div>
          <div class="field">
            <label>Last name</label>
            <div class="field-wrap">
              <span class="field-ico"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
              <input type="text" placeholder="Kumar">
            </div>
          </div>
        </div>
        <div class="field">
          <label>Work email</label>
          <div class="field-wrap">
            <span class="field-ico"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            <input type="email" placeholder="you@company.com">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-wrap">
            <span class="field-ico"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
          </div>
          <div class="strength-row">
            <div class="s-seg" id="s1"></div>
            <div class="s-seg" id="s2"></div>
            <div class="s-seg" id="s3"></div>
            <div class="s-seg" id="s4"></div>
          </div>
        </div>
        <button class="btn-primary" style="margin-top:4px">Create Free Account →</button>
        <div class="divider"><span>or sign up with</span></div>
        <div class="social-row">
          <button class="btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#333"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  const t = document.getElementById('form-title');
  const s = document.getElementById('form-sub');
  if (tab === 'login') { t.textContent = 'Welcome back'; s.textContent = 'Sign in to your account to continue.'; }
  else { t.textContent = 'Create account'; s.textContent = 'Start monitoring your IoT fleet for free.'; }
}

function checkStrength(v) {
  const segs = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const cls = ['','fill-weak','fill-weak','fill-medium','fill-strong'];
  segs.forEach((s, i) => { s.className = 's-seg' + (i < score ? ' ' + cls[score] : ''); });
}
</script>
</body>
</html>
