{% extends "_main.html" %}

{% block content %}
 <!-- SIGN IN -->
      <div >
        <div class="auth-page">
          <div class="auth-card">
            <h2>Welcome back</h2>
            <p>Enter your email and password to sign in</p>
            <div class="form-group"><label>EMAIL</label><input type="email" placeholder="Your email address"></div>
            <div class="form-group"><label>PASSWORD</label><input type="password" placeholder="Your password"></div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
              <div class="toggle-check" style="margin-bottom:0"><input type="checkbox"> <span>Remember me</span></div>
            </div>
            <button class="btn-primary">SIGN IN</button>
            <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)">Don't have an account? <a href="#signup" style="color:var(--primary);font-weight:600">Sign up</a></p>
          </div>
        </div>
      </div>
    {%endblock %}
